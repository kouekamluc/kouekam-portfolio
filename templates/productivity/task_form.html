{% extends 'base.html' %}

{% block content %}
<section class="bg-white dark:bg-gray-900 py-8 lg:py-16">
    <div class="px-4 mx-auto max-w-screen-xl lg:px-6">
        <a href="{% url 'task_list' %}" 
           class="inline-flex items-center text-sm text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 mb-4 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i>Back to Tasks
        </a>
        <h1 class="text-4xl font-bold mb-8 dark:text-white">{{ form_type }} Task</h1>
        
        <div class="bg-white dark:bg-gray-800 shadow rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    {% if form.non_field_errors %}
                        <div class="rounded-md bg-red-50 dark:bg-red-900/20 p-4">
                            <div class="flex">
                                <div class="flex-shrink-0">
                                    <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
                                    </svg>
                                </div>
                                <div class="ml-3">
                                    <h3 class="text-sm font-medium text-red-800 dark:text-red-200">Please correct the following errors:</h3>
                                    <div class="mt-2 text-sm text-red-700 dark:text-red-300">
                                        {{ form.non_field_errors }}
                                    </div>
                                </div>
                            </div>
                        </div>
                    {% endif %}

                    <div>
                        <label for="title" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">
                            Title
                        </label>
                        <div class="mt-2">
                            <input type="text" name="title" id="title" value="{% if task %}{{ task.title }}{% endif %}" required
                                class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-blue-600 dark:focus:ring-blue-500 sm:text-sm sm:leading-6 bg-white dark:bg-gray-800">
                        </div>
                    </div>

                    <div>
                        <label for="description" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">
                            Description
                        </label>
                        <div class="mt-2">
                            <textarea id="description" name="description" rows="4"
                                class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-blue-600 dark:focus:ring-blue-500 sm:text-sm sm:leading-6 bg-white dark:bg-gray-800">{% if task %}{{ task.description }}{% endif %}</textarea>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-2">
                        <div>
                            <label for="priority" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">
                                Priority
                            </label>
                            <div class="mt-2">
                                <select id="priority" name="priority"
                                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 focus:ring-2 focus:ring-inset focus:ring-blue-600 dark:focus:ring-blue-500 sm:text-sm sm:leading-6 bg-white dark:bg-gray-800">
                                    <option value="low" {% if task and task.priority == 'low' %}selected{% endif %}>Low</option>
                                    <option value="medium" {% if task and task.priority == 'medium' %}selected{% endif %}>Medium</option>
                                    <option value="high" {% if task and task.priority == 'high' %}selected{% endif %}>High</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label for="status" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">
                                Status
                            </label>
                            <div class="mt-2">
                                <select id="status" name="status"
                                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 focus:ring-2 focus:ring-inset focus:ring-blue-600 dark:focus:ring-blue-500 sm:text-sm sm:leading-6 bg-white dark:bg-gray-800">
                                    <option value="todo" {% if task and task.status == 'todo' %}selected{% endif %}>To Do</option>
                                    <option value="in_progress" {% if task and task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                                    <option value="done" {% if task and task.status == 'done' %}selected{% endif %}>Done</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label for="due_date" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">
                            Due Date
                        </label>
                        <div class="mt-2">
                            <input type="date" name="due_date" id="due_date" value="{% if task and task.due_date %}{{ task.due_date|date:'Y-m-d' }}{% endif %}"
                                class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-blue-600 dark:focus:ring-blue-500 sm:text-sm sm:leading-6 bg-white dark:bg-gray-800">
                        </div>
                    </div>

                    <div class="flex items-center justify-end gap-x-6 pt-6 border-t border-gray-200 dark:border-gray-700">
                        <a href="{% url 'task_list' %}" class="text-sm font-semibold leading-6 text-gray-900 dark:text-white hover:text-gray-700 dark:hover:text-gray-300">
                            Cancel
                        </a>
                        <button type="submit"
                            class="rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 dark:bg-blue-500 dark:hover:bg-blue-400">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
