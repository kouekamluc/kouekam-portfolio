{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block head_title %}Account{% endblock %} - Kouekam Digital Hub</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <link rel="shortcut icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <link rel="apple-touch-icon" href="{% static 'favicon.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme ? savedTheme === 'dark' : prefersDark;
            document.documentElement.classList.toggle('dark', isDark);
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Source Sans 3"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        display: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {"50":"#f0fdfa","100":"#ccfbf1","200":"#99f6e4","300":"#5eead4","400":"#2dd4bf","500":"#14b8a6","600":"#0f766e","700":"#115e59","800":"#134e4a","900":"#042f2e","950":"#022c22"}
                    }
                }
            }
        }
    </script>
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="flex min-h-screen flex-col text-slate-900 antialiased transition-colors duration-300 dark:text-white">
    {% include 'components/navbar.html' %}

    <main class="flex-grow overflow-x-clip">
        <div class="app-container py-8">
            {% if messages %}
                <div class="mb-4">
                    {% for message in messages %}
                        <div id="alert-{{ forloop.counter }}" 
                             class="flex items-center p-4 mb-4 rounded-lg shadow-lg
                             {% if message.tags == 'error' or message.tags == 'danger' %}
                                 text-red-800 bg-red-50 dark:bg-red-900 dark:text-red-200 border border-red-200 dark:border-red-800
                             {% elif message.tags == 'success' %}
                                 text-green-800 bg-green-50 dark:bg-green-900 dark:text-green-200 border border-green-200 dark:border-green-800
                             {% elif message.tags == 'warning' %}
                                 text-yellow-800 bg-yellow-50 dark:bg-yellow-900 dark:text-yellow-200 border border-yellow-200 dark:border-yellow-800
                             {% else %}
                                 text-blue-800 bg-blue-50 dark:bg-blue-900 dark:text-blue-200 border border-blue-200 dark:border-blue-800
                             {% endif %}" 
                             role="alert">
                            <svg class="flex-shrink-0 w-5 h-5 mr-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                                {% if message.tags == 'error' or message.tags == 'danger' %}
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                                {% elif message.tags == 'success' %}
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                                {% else %}
                                    <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
                                {% endif %}
                            </svg>
                            <div class="text-sm font-medium flex-1">{{ message }}</div>
                            <button type="button" onclick="this.parentElement.remove()" 
                                    class="ml-auto -mx-1.5 -my-1.5 rounded-lg p-1.5 inline-flex h-8 w-8 hover:bg-opacity-20 focus:ring-2 focus:ring-offset-2 transition-colors">
                                <span class="sr-only">Close</span>
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                                </svg>
                            </button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </div>
    </main>

    {% include 'components/footer.html' %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.0/flowbite.min.js"></script>
    <script>
        (function() {
            const html = document.documentElement;
            const themeButtons = document.querySelectorAll('[data-theme-toggle]');

            function syncThemeButtons() {
                const dark = html.classList.contains('dark');
                themeButtons.forEach(button => {
                    const icon = button.querySelector('i');
                    if (!icon) return;
                    icon.className = dark ? 'fas fa-sun text-sm' : 'fas fa-moon text-sm';
                    button.setAttribute('aria-label', dark ? 'Switch to light theme' : 'Switch to dark theme');
                    button.setAttribute('title', dark ? 'Switch to light theme' : 'Switch to dark theme');
                });
            }

            themeButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const dark = !html.classList.contains('dark');
                    html.classList.toggle('dark', dark);
                    html.setAttribute('data-theme', dark ? 'dark' : 'light');
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                    syncThemeButtons();
                });
            });

            syncThemeButtons();
        })();

        // Auto-dismiss messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            const alerts = document.querySelectorAll('[id^="alert-"]');
            alerts.forEach(alert => {
                setTimeout(() => {
                    alert.style.transition = 'opacity 0.3s ease-out';
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 300);
                }, 5000);
            });
        });
    </script>
</body>
</html>
