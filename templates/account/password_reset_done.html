{% extends "account/base.html" %}
{% load i18n %}

{% block head_title %}{% trans "Password Reset" %}{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <div class="text-center mb-8">
            <div class="auth-icon mb-4">
                <i class="fas fa-envelope-circle-check text-white text-2xl"></i>
            </div>
            <h1 class="auth-title">Email Sent</h1>
            <p class="auth-copy">
                {% trans "We have sent you an e-mail. Please contact us if you do not receive it within a few minutes." %}
            </p>
        </div>

        <a href="{% url 'account_login' %}" class="btn-secondary w-full">Back to Sign In</a>
    </div>
</div>
{% endblock %}
