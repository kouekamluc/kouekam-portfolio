{% extends "account/base.html" %}
{% load i18n %}

{% block head_title %}{% trans "Sign Out" %}{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <div class="text-center mb-8">
            <div class="auth-icon mb-4">
                <i class="fas fa-right-from-bracket text-white text-2xl"></i>
            </div>
            <h1 class="auth-title">Sign Out</h1>
            <p class="auth-copy">Are you sure you want to sign out?</p>
        </div>

        <form method="POST" action="{% url 'account_logout' %}" class="space-y-6">
            {% csrf_token %}
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}
        
            <div class="grid gap-3 sm:grid-cols-2">
                <button type="submit" class="btn-primary">Sign Out</button>
                <a href="{% url 'home' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
