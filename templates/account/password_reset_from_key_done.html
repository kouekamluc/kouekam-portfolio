{% extends "account/base.html" %}
{% load i18n %}

{% block head_title %}{% trans "Change Password" %}{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <div class="text-center mb-8">
            <div class="auth-icon mb-4">
                <i class="fas fa-circle-check text-white text-2xl"></i>
            </div>
            <h1 class="auth-title">Password Changed</h1>
            <p class="auth-copy">{% trans 'Your password is now changed.' %}</p>
        </div>

        <a href="{% url 'account_login' %}" class="btn-primary w-full">Sign In</a>
    </div>
</div>
{% endblock %}
